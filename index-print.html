<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lexamin Legal — Nikhil Amin · Residential Property Solicitor</title>
  <meta name="description" content="Nikhil Amin — consultant residential property solicitor with almost 15 years' experience." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* ---- Print rules ---- */
    @page {
      size: A4 portrait;
      margin: 0;
    }

    html, body {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Hide interactive chrome */
    .twk-panel { display: none !important; }

    @media print {
      /* Make sticky nav act as a normal block */
      .nav {
        position: static !important;
        backdrop-filter: none !important;
      }

      /* Page break controls — each major section starts on a fresh page */
      .hero { break-after: page; page-break-after: always; }
      .about { break-after: page; page-break-after: always; }
      .services { break-after: page; page-break-after: always; }
      .principles { break-after: page; page-break-after: always; }
      .experience { break-after: page; page-break-after: always; }
      .contact { break-after: page; page-break-after: always; }

      /* Avoid splitting cards/rows across pages */
      .service,
      .timeline-row,
      .principle,
      .detail-row,
      .hero-card,
      .signature { break-inside: avoid; page-break-inside: avoid; }

      /* Trim section padding so content fits A4 portrait */
      .hero { padding: 60px 0 60px !important; }
      .about, .services, .experience, .contact { padding: 60px 0 !important; }
      .principles { padding: 50px 0 !important; }

      .wrap, .nav-inner { padding: 0 36px !important; }

      /* Disable any motion */
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }

      /* Hide CTA buttons that don't make sense on paper */
      .hero-cta { display: none !important; }
      .contact .btn { display: none !important; }
      .nav-links .btn { display: none !important; }

      /* Force section backgrounds to render */
      .nav, .hero, .services, .principles, .contact, .foot {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Slightly compress hero typography for portrait */
      .hero h1 { font-size: 56px !important; }
      .hero-meta { margin-top: 36px !important; }
      .hero-card { min-height: 380px !important; }
      .hero-portrait { min-height: 220px; }

      /* Services grid stays 3-column even narrow */
      .service-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .service { min-height: 220px !important; padding: 28px 24px !important; }
      .service h3 { font-size: 21px !important; }
      .service p { font-size: 12.5px !important; }

      /* Experience: keep timeline two-col */
      .timeline-row { grid-template-columns: 160px 1fr !important; gap: 40px !important; padding: 28px 0 !important; }
      .timeline-content h3 { font-size: 22px !important; }
      .timeline-content p { font-size: 13.5px !important; }

      /* Hide nav links other than logo for print clarity */
      .nav-links { gap: 24px !important; font-size: 11px !important; }

      /* Footer compact */
      .foot { padding: 22px 0 !important; }
    }
  </style>

  <!-- SEO:meta (managed) -->
  <link rel="canonical" href="https://lexaminlegal.com/" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- /SEO:meta -->
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="logos.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait for React render, fonts, and a settle delay, then auto-print.
    (async () => {
      // wait for root to have rendered children
      const root = document.getElementById('root');
      const waitForRender = () => new Promise((resolve) => {
        const check = () => {
          if (root && root.children.length > 0) resolve();
          else requestAnimationFrame(check);
        };
        check();
      });
      await waitForRender();

      // wait for fonts
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }

      // settle delay
      await new Promise(r => setTimeout(r, 600));

      window.print();
    })();
  </script>
</body>
</html>
